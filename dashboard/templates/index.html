<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0DTE Command Centre</title>
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="top-bar">
    <div class="logo">0DTE COMMAND CENTRE</div>
    <div id="clock" class="clock"></div>
  </header>

  <div class="app-layout">
    <nav class="sidebar" id="sidebar">
      <a href="#" class="nav-item active" data-page="dashboard"
         hx-get="/pages/dashboard" hx-target="#main-content" hx-swap="innerHTML"
         hx-on::after-request="setActivePage(this)">
        <span class="nav-icon">&#9632;</span> Dashboard
      </a>
      <a href="#" class="nav-item" data-page="performance"
         hx-get="/pages/performance?period=all" hx-target="#main-content" hx-swap="innerHTML"
         hx-on::after-request="setActivePage(this)">
        <span class="nav-icon">&#9650;</span> Performance
      </a>
      <a href="#" class="nav-item" data-page="charts"
         hx-get="/pages/charts?period=all" hx-target="#main-content" hx-swap="innerHTML"
         hx-on::after-request="setActivePage(this)">
        <span class="nav-icon">&#9644;</span> Charts
      </a>
      <a href="#" class="nav-item" data-page="strategies"
         hx-get="/pages/strategies" hx-target="#main-content" hx-swap="innerHTML"
         hx-on::after-request="setActivePage(this)">
        <span class="nav-icon">&#9881;</span> Strategy Rules
      </a>
      <a href="#" class="nav-item" data-page="system"
         hx-get="/pages/system" hx-target="#main-content" hx-swap="innerHTML"
         hx-on::after-request="setActivePage(this)">
        <span class="nav-icon">&#9881;</span> System
      </a>
    </nav>

    <main class="main-content" id="main-content">
      {% include 'pages/dashboard.html' %}
    </main>
  </div>

  <script src="/static/js/dashboard.js"></script>
  <script src="/static/js/charts.js"></script>
</body>
</html>
